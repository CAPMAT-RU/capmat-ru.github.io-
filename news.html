<!DOCTYPE html>
<html lang="ru">
<head><meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новость | РАКУРС</title>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet"><style>
        :root { --bg-color: #1a1a1a; --text-color: #f0f0f0; --accent-color: #e09f7d; --card-bg: #222222; --border-color: #333333; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); min-height: 100vh; padding-top: 60px; }
        #article-container { max-width: 800px; margin: 40px auto; padding: 30px; background: var(--card-bg); border-radius: 8px; }
        .video-container { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; overflow: hidden; cursor: pointer; }
        .video-container video { width: 100%; height: 100%; }
        .video-controls { position: absolute; bottom: 0; left: 0; width: 100%; height: 50px; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(5px); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; opacity: 0; transition: opacity 0.3s; }
        .video-container:hover .video-controls { opacity: 1; }
        .vol-wrapper { position: relative; display: flex; align-items: center; }
        .btn-icon { width: 28px; height: 28px; cursor: pointer; filter: brightness(0) invert(1); }
        .volume-panel { position: absolute; bottom: 50px; left: 0; width: 40px; height: 100px; background: rgba(0,0,0,0.8); display: none; justify-content: center; padding: 10px 0; border-radius: 4px; }
        .volume-panel.active { display: flex; }
        #volume-slider { writing-mode: bt-lr; appearance: slider-vertical; width:6px; height: 80px; accent-color: var(--accent-color); }
        .play-button { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 60px; height: 60px; border: 2px solid var(--accent-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; pointer-events: none; }
        .play-icon { width: 0; height: 0; border-top: 10px solid transparent; border-bottom: 10px solid transparent; border-left: 18px solid var(--accent-color); margin-left: 4px; }
    </style>
</head>
<body>    <main><div id="article-container">Загрузка...</div></main>
    <script>
        async function loadSingleArticle() {
            const params = new URLSearchParams(window.location.search);
            const newsId = params.get('id');
            const container = document.getElementById('article-container');
            const response = await fetch('news.json');
            const data = await response.json();
            const news = data.find(n => n.id == newsId);

            if (news) {
                container.innerHTML = `
                    <div class="video-container" id="vid-wrapper">
                        <video id="main-video" src="${news.videoUrl}"></video>
                        <div class="play-button" id="play-btn"><div class="play-icon"></div></div>
                        <div class="video-controls" id="v-controls">
                            <div class="vol-wrapper">
                                <img src="https://raw.githubusercontent.com/rakurs-news/rakurs-news.github.io/main/images/IMG_20260712_040343.webp" class="btn-icon" id="vol-btn">
                                <div class="volume-panel" id="vol-panel"><input type="range" id="volume-slider" min="0" max="1" step="0.1" value="0.5"></div>                            </div>
                            <img src="https://raw.githubusercontent.com/rakurs-news/rakurs-news.github.io/main/images/IMG_20260712_041022.webp" class="btn-icon" id="fs-btn">
                        </div></div><h1>${news.title}</h1>`;

                const video = document.getElementById('main-video'), btn = document.getElementById('play-btn'), 
                      volBtn = document.getElementById('vol-btn'), volPanel = document.getElementById('vol-panel'),
                      volSlider = document.getElementById('volume-slider'), fsBtn = document.getElementById('fs-btn'),                      wrapper = document.getElementById('vid-wrapper');

                let hideTimeout;
                const resetHide = () => { clearTimeout(hideTimeout); hideTimeout = setTimeout(() => { if(!video.paused) document.getElementById('v-controls').style.opacity = '0'; }, 3000); };
                wrapper.onmousemove = () => { document.getElementById('v-controls').style.opacity = '1'; resetHide(); };

                wrapper.onclick = () => {
                    if (video.paused) { video.play(); btn.style.display = 'none'; resetHide(); }
                    else { video.pause(); btn.style.display = 'flex'; clearTimeout(hideTimeout); }
                };
                volBtn.onclick = (e) => { e.stopPropagation(); volPanel.classList.toggle('active'); };
                volSlider.oninput = (e) => { video.volume = e.target.value; e.stopPropagation(); };
                fsBtn.onclick = (e) => { e.stopPropagation(); !document.fullscreenElement ? wrapper.requestFullscreen() : document.exitFullscreen(); };
            }
        }        loadSingleArticle();
    </script>
</body>
</html>
