<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{headline}} — Ракурс NEWS</title>

    <!-- Микроразметка Schema.org -->
    <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "NewsArticle",
            "headline": "{{headline}}",
            "datePublished": "{{datePublished}}",
            "dateModified": "{{dateModified}}",
            "author": {
                "@type": "Organization",
                "name": "Ракурс NEWS"
            },
            "publisher": {
                "@type": "Organization",
                "name": "Ракурс NEWS",
                "logo": {
                    "@type": "ImageObject",
                    "url": "/logo.png"
                }
            },
            "description": "{{description}}",
            "image": [
                "{{imageUrl}}"
            ]
        }
    </script>

    <style>
        :root { --bg: #121212; --card: #1e1e1e; --accent: #ff9800; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; line-height: 1.6; margin: 0; padding: 20px; }
        header { border-bottom: 2px solid var(--accent); padding-bottom: 20px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: bold; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; font-size: 18px; }
        
        /* Кнопка "Назад" */
        .back-btn {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 8px 16px;
            text-decoration: none;
            font-size: 14px;
            border-radius: 4px;
            transition: all 0.3s;
            cursor: pointer;
        }
        .back-btn:hover { background: var(--accent); color: #000; }

        article { max-width: 800px; margin: 0 auto; }
        h1 { color: var(--accent); margin-bottom: 15px; }
        .meta { color: #888; font-size: 13px; margin-bottom: 25px; text-transform: uppercase; }
        img.featured-image { width: 100%; height: auto; border-radius: 8px; margin-bottom: 20px; object-fit: cover; }
        p { font-size: 16px; margin-bottom: 15px; color: #e0e0e0; }
        a { color: var(--accent); text-decoration: underline; }
    </style>
</head>
<body>

    <header>
        <div class="logo">Ракурс NEWS</div>
        <!-- Кнопка "Назад" -->
        <a href="index.html" class="back-btn">← Назад к ленте</a>
    </header>

    <article>
        <h1 id="article-title">{{headline}}</h1>
        
        <div class="meta">
            Опубликовано: <span id="article-date">{{datePublished}}</span> • Категория: {{category}}
        </div>

        {{#imageUrl}}
        <img src="{{imageUrl}}" alt="{{headline}}" class="featured-image">
        {{/imageUrl}}

        <div id="article-content">
            {{content}}
        </div>
    </article>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');

            if (id) {
                fetch('news.json')
                    .then(res => res.json())
                    .then(data => {
                        const newsItem = data.find(item => item.id == id);
                        if (newsItem) {
                            document.getElementById('article-title').textContent = newsItem.title;
                            document.getElementById('article-date').textContent = newsItem.date;
                            
                            // Динамическое обновление JSON-LD
                            const ldScript = document.querySelector('script[type="application/ld+json"]');
                            if (ldScript) {
                                const jsonData = JSON.parse(ldScript.innerText);
                                jsonData.headline = newsItem.title;
                                jsonData.datePublished = newsItem.date; 
                                jsonData.description = newsItem.content.substring(0, 160);
                                if (newsItem.image) jsonData.image = [newsItem.image];
                                ldScript.textContent = JSON.stringify(jsonData);
                            }

                            const contentDiv = document.getElementById('article-content');
                            contentDiv.innerHTML = newsItem.content;
                        } else {
                            document.body.innerHTML = '<h1 style="color:#e0e0e0">Новость не найдена</h1><a href="index.html" style="color:var(--accent)">Вернуться на главную</a>';
                        }
                    })
                    .catch(err => console.error(err));
            }
        });
    </script>
</body>
</html>
