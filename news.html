<!DOCTYPE html>
<html lang="ru">
<head><meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новость | РАКУРС</title>
    <meta name="description" content="Читайте последние новости на портале РАКУРС">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet"><style>
        :root {
            --bg-color: #1a1a1a;
            --text-color: #f0f0f0;
            --accent-color: #e09f7d;
            --card-bg: #222222;
            --border-color: #333333;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); min-height: 100vh; display: flex; flex-direction: column; padding-top: 60px; }
        header { position: fixed; top: 0; left: 0; width: 100%; height: 60px; background-color: rgba(26, 26, 26, 0.8); backdrop-filter: blur(10px); display: flex; align-items: center; padding: 0 15px; z-index: 1000; border-bottom: 1px solid rgba(255, 255, 255,0.1); }
        header .logo-container { display: flex; align-items: center; }
        header .logo-container img { height:30px; margin-right: 10px; }
        header h1 { color: var(--accent-color); font-weight: 700; letter-spacing: 1px; font-size: 28px; }
        footer { margin-top: auto; padding: 20px; text-align: center; color: #888; font-size: 0.9rem; border-top:1px solid rgba(255, 255, 255, 0.1); }.back-btn { display: block; padding: 10px 15px; max-width: 220px; width: 100%; box-sizing: border-box; background: transparent; border:2px solid var(--accent-color); color: var(--accent-color); text-decoration: none; font-weight: bold; border-radius:25px; transition: all 0.3s; margin:30px auto 40px; text-align: center;}
        .back-btn:hover { background: var(--accent-color); color: var(--bg-color); transform: scale(1.05); }
        #article-container { max-width: 800px; margin:40px auto; padding: 30px; background: var(--card-bg); border-radius: 8px; border:1px solid var(--border-color); }
        #article-container img { width: 100%; height: auto; max-height: 500px; object-fit: cover; border-radius:4px; margin-bottom: 25px; }
        #article-container h1 { font-size: 2.2rem; margin-bottom: 20px; }
        .meta-info { color: #aaa; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom:5px; }
        .category-meta { color: var(--accent-color); font-weight:700; }
        .content-text { font-family: 'Merriweather', serif; font-size: 1.1rem; line-height: 1.7; white-space: pre-wrap; }
        
        .video-container { position: relative; width: 100%; margin-bottom: 20px; border-radius: 8px; overflow: hidden; background: #000; aspect-ratio: 16/9; }
        .video-container video { width: 100%; height: 100%; display: block; }
        .play-button { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 60px; height: 60px; background: rgba(0,0,0,0.5); border-radius: 50%; display: flex; justify-content: center; align-items: center; border:2px solid var(--accent-color); pointer-events: none; }
        .play-icon { width: 0; height: 0; border-top: 10px solid transparent; border-bottom: 10px solid transparent; border-left: 18px solid var(--accent-color); margin-left: 4px; }
        
        .video-controls { position: absolute; bottom: 0; width: 100%; height: 45px; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(8px); display: flex; align-items: center; padding: 0 15px; opacity: 0; transition: opacity 0.3s; justify-content: space-between; }.video-container:hover .video-controls { opacity: 1; }
        .controls-right { display: flex; align-items: center; gap: 15px; }
        .player-icon { width: 22px; height: 22px; cursor: pointer; filter: sepia(1) saturate(5) hue-rotate(340deg) brightness(1.2); }
        .volume-panel { display: none; position: absolute; bottom: 50px; left: 10px; background: rgba(0,0,0,0.85); padding: 10px; border-radius: 6px; }
        #volume-slider { writing-mode: bt-lr; appearance: slider-vertical; width: 6px; height: 70px; accent-color: var(--accent-color); cursor: pointer; }
    </style>
</head>
<body>
    <header>        <div class="logo-container">
            <img src="https://raw.github.com/rakurs-news/rakurs-news.github.io/main/images/IMG_20260706_221334.png" alt="Логотип">
            <h1>РАКУРС</h1></div>
    </header>
    <main>
        <div id="article-container">            <p style="text-align: center; color: #666;">Загрузка статьи...</p>        </div>
    </main>
    <footer><p>©2026 РАКУРС</p></footer>

    <script>
        async function loadSingleArticle() {
            const params = new URLSearchParams(window.location.search);
            const newsId = params.get('id');
            const container = document.getElementById('article-container');

            try {
                const response = await fetch('news.json');
                const data = await response.json();
                const news = data.find(n => n.id == newsId);

                if (news) {
                    document.title = `${news.title} | РАКУРС`;let mediaHtml = news.videoUrl
                        ? `<div class="video-container" id="vid-wrapper">
                             <video id="main-video" src="${news.videoUrl}" playsinline></video>
                             <div class="play-button" id="play-btn"><div class="play-icon"></div></div>
                             <div class="video-controls" id="v-controls">
                                <div style="position:relative">
                                    <img src="https://github.com/rakurs-news/rakurs-news.github.io/blob/main/images/IMG_20260712_040343.webp?raw=true" class="player-icon" id="vol-btn">
                                    <div class="volume-panel" id="vol-panel"><input type="range" id="volume-slider" min="0" max="1" step="0.05" value="0.5"></div>
                                </div>
                                <img src="https://github.com/rakurs-news/rakurs-news.github.io/blob/main/images/IMG_20260712_041022.webp?raw=true" class="player-icon" id="fs-btn">
                             </div>
                           </div>`
                        : `<img src="${news.image}" alt="${news.title}">`;

                    container.innerHTML = `${mediaHtml}<h1>${news.title}</h1><div class="meta-info"><span class="category-meta">Рубрика: ${news.category}</span></div><div class="content-text">${news.content}</div><a href="index.html" class="back-btn">← На Главную</a>`;if (news.videoUrl) {
                        const video = document.getElementById('main-video'), btn = document.getElementById('play-btn'), 
                              controls = document.getElementById('v-controls'), volBtn = document.getElementById('vol-btn'), 
                              volPanel = document.getElementById('vol-panel'), volSlider = document.getElementById('volume-slider'), 
                              fsBtn = document.getElementById('fs-btn'), wrapper = document.getElementById('vid-wrapper');
                        
                        let timer;
                        const hideControls = () => { if(!video.paused) controls.style.opacity = '0'; };
                        wrapper.onmousemove = () => { controls.style.opacity = '1'; clearTimeout(timer); timer = setTimeout(hideControls, 3000); };wrapper.onclick = () => {
                            if (video.paused) { video.play(); btn.style.display = 'none'; timer = setTimeout(hideControls, 3000); }
                            else { video.pause(); btn.style.display = 'flex'; clearTimeout(timer); }
                        };
                        volBtn.onclick = (e) => { e.stopPropagation(); volPanel.style.display = volPanel.style.display === 'block' ? 'none' : 'block'; };
                        volSlider.oninput = (e) => { video.volume = e.target.value; e.stopPropagation(); };
                        fsBtn.onclick = (e) => { e.stopPropagation(); !document.fullscreenElement ? wrapper.requestFullscreen() : document.exitFullscreen(); };
                    }
                }
            } catch (err) { container.innerHTML =`<h2>Ошибка загрузки</h2>`; }
        }
        loadSingleArticle();
    </script>
</body>
</html>
