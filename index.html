<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>РАКУРС NEWS — Последние новости</title>
  <!-- Подключаем шрифты -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet" />
  
  <style>
    :root {
        --bg-color: #1a1a1a;
        --text-color: #f0f0f0;
        --accent-color: #e09f7d;
        --card-bg: #222222;
        --menu-bg: #2c2c2c;
        --border-color: #333333;
        --link-color: #4da6ff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
    body { background-color: var(--bg-color); color: var(--text-color); min-height: 100vh; display: flex; flex-direction: column; }

    /* --- Шапка --- */
    header { position: fixed; top: 0; left: 0; width: 100%; height: 60px; background-color: rgba(26, 26, 26, 0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; z-index: 1000; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
    .logo { font-size: 24px; font-weight: 700; letter-spacing: 1px; color: var(--accent-color); text-decoration: none; }
    
    /* --- Основной контент --- */
    main { margin-top: 80px; padding: 40px; max-width: 1200px; margin-left: auto; margin-right: auto; width: 100%; flex: 1; }
    h2.section-title { margin-bottom: 30px; border-left: 5px solid var(--accent-color); padding-left: 15px; font-size: 28px; }

    /* Сетка карточек */
    .news-grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
      gap: 30px; 
    }

    /* Карточка-ссылка (анонс) */
    .news-card { 
      background-color: var(--card-bg); 
      border: 1px solid var(--border-color); 
      padding: 20px; 
      border-radius: 6px; 
      transition: transform 0.2s, box-shadow 0.2s; 
      text-decoration: none; /* Убираем подчеркивание у ссылки */
      color: inherit; /* Наследуем цвет текста */
      display: block;
    }
    .news-card:hover { 
      transform: translateY(-5px); 
      box-shadow: 0 10px 20px rgba(0,0,0,0.3); 
      border-color: var(--accent-color);
    }

    .category-tag { 
      color: var(--accent-color); 
      font-size: 12px; 
      font-weight: bold; 
      text-transform: uppercase; 
      margin-bottom: 12px; 
      display: inline-block;
      border-bottom: 1px dashed var(--accent-color);
      padding-bottom: 4px;
    }

    .card-title { 
      font-size: 22px; 
      line-height: 1.3; 
      margin-bottom: 20px; 
      color: #fff;
    }

    .card-meta { 
      font-size: 14px; 
      color: #aaa; 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      border-top: 1px solid #333; 
      padding-top: 15px;
    }
    .publish-date { color: var(--accent-color); }

    footer { 
      height: 70px; 
      padding: 20px; 
      background-color: rgba(26, 26, 26, 0.8); 
      border-top: 1px solid rgba(255, 255, 255, 0.1); 
      margin-top: auto; 
      text-align: center; 
      display: flex; 
      flex-direction: column; 
      justify-content: center; 
      align-items: center; 
      width: 100%; 
    }
    .copyright { font-size: 16px; color: #888; }

    @media (max-width: 600px) {
      .news-grid { grid-template-columns: 1fr; }
      main { padding: 20px; }
    }
  </style>
</head>
<body>

  <header>
    <a href="index.html" class="logo">РАКУРС NEWS</a>
  </header>

  <main>
    <h2 class="section-title">Последние новости</h2>
    
    <div class="news-grid">
      
      <!-- КАРТОЧКА 1: Ссылка ведет на отдельный файл -->
      <a href="nacizm-na-ukraine.html" class="news-card">
        <span class="category-tag">Политика</span>
        <h3 class="card-title">Нацизм на Украине как есть.</h3>
        <div class="card-meta">
          <span class="publish-date">11 июля 2026г.</span>
          <span>Автор: Дмитрий Мусиенко</span>
        </div>
      </a>

      <!-- Сюда добавляй новые карточки по мере создания новых файлов -->
      <!-- <a href="news/new-file.html" class="news-card"> ... </a> -->

    </div>
  </main>

  <footer>
    <p class="copyright">2026 © РАКУРС NEWS</p>
  </footer>

</body>
</html>
